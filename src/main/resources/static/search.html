<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICOM 다중 필터 검색</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h2 { color: #333; text-align: center; }
        .filter-group { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .filter-group h4 { margin-top: 0; color: #007bff; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        label { cursor: pointer; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #results { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; min-height: 100px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 DICOM 메타데이터 다중 검색</h2>

    <div class="filter-group">
        <h4>🧠 촬영 옵션</h4>
        <label><input type="checkbox" id="isT1Axial"> T1 Axial 영상만 보기</label>
    </div>

    <div class="filter-group">
        <h4>📸 모달리티 (다중 선택 가능)</h4>
        <div class="checkbox-grid" id="modalityGroup">
            <label><input type="checkbox" value="CT"> CT</label>
            <label><input type="checkbox" value="MR"> MR</label>
            <label><input type="checkbox" value="US"> US</label>
            <label><input type="checkbox" value="XA"> XA</label>
            <label><input type="checkbox" value="XR"> XR</label>
            <label><input type="checkbox" value="OT"> OT</label>
            <label><input type="checkbox" value="OPT"> OPT</label>
        </div>
    </div>

    <div class="filter-group">
        <h4>🎂 환자 연령대 (다중 선택 가능)</h4>
        <div class="checkbox-grid" id="ageGroup">
            <label><input type="checkbox" data-min="0" data-max="9"> 0~9세</label>
            <label><input type="checkbox" data-min="10" data-max="19"> 10~19세</label>
            <label><input type="checkbox" data-min="20" data-max="29"> 20~29세</label>
            <label><input type="checkbox" data-min="30" data-max="39"> 30~39세</label>
            <label><input type="checkbox" data-min="40" data-max="49"> 40~49세</label>
            <label><input type="checkbox" data-min="50" data-max="59"> 50~59세</label>
            <label><input type="checkbox" data-min="60" data-max="69"> 60~69세</label>
            <label><input type="checkbox" data-min="70" data-max="79"> 70~79세</label>
            <label><input type="checkbox" data-min="80" data-max="89"> 80~89세</label>
            <label><input type="checkbox" data-min="90" data-max="99"> 90~99세</label>
            <label><input type="checkbox" data-min="100" data-max="150"> 100세 이상</label>
        </div>
    </div>

    <button id="searchBtn">조건에 맞는 데이터 검색하기</button>

    <h4>검색 결과:</h4>
    <div id="results">결과가 여기에 표시됩니다.</div>
</div>

<script>
    document.getElementById('searchBtn').addEventListener('click', function() {

        const isT1Axial = document.getElementById('isT1Axial').checked;
        const selectedModalities = Array.from(document.querySelectorAll('#modalityGroup input:checked')).map(cb => cb.value);

        let minAge = null;
        let maxAge = null;
        const checkedAges = document.querySelectorAll('#ageGroup input:checked');

        if (checkedAges.length > 0) {
            let mins = Array.from(checkedAges).map(cb => parseInt(cb.getAttribute('data-min')));
            let maxs = Array.from(checkedAges).map(cb => parseInt(cb.getAttribute('data-max')));
            minAge = Math.min(...mins);
            maxAge = Math.max(...maxs);
        }

        const params = new URLSearchParams();
        if (isT1Axial) params.append('isT1Axial', 'true');
        selectedModalities.forEach(mod => params.append('modalities', mod));
        if (minAge !== null) params.append('minAge', minAge);
        if (maxAge !== null) params.append('maxAge', maxAge);

        const requestUrl = '/dicom/search?' + params.toString();

        document.getElementById('results').textContent = "서버로 요청 중...\nURL: " + requestUrl;

        fetch(requestUrl)
            .then(response => response.json())
            .then(data => {
                document.getElementById('results').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('results').textContent = "❌ 조회 에러 발생 또는 백엔드가 아직 준비되지 않았습니다!\nURL을 확인해주세요: " + requestUrl;
            });
    });
</script>

</body>
</html>
